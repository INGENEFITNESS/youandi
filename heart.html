<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumping Heart</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fce4ec;
            font-family: Arial, sans-serif;
        }
        .heart {
            font-size: 80px;
            color: red;
            animation: beat 0.8s infinite alternate;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #d8698e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    <button class="btn" id="loveButton">Click me to see what Aaryan is thinking right now</button>

    <script>
        document.getElementById('loveButton').addEventListener('click', function() {
            this.innerText = "You are cute Saniya!!";
        });
    </script>

</body>
</html>
